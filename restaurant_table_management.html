<!DOCTYPE html>
<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00f0ff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>ZipZapZoi - Floor Command Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: { 
                extend: { 
                    colors: { 
                        primary: "#00f0ff", 
                        bg: "#0b0d11", 
                        surface: "#16181d", 
                        border: "#262931", 
                        success: "#10b981", 
                        danger: "#ef4444",
                        warning: "#f59e0b",
                        info: "#3b82f6"
                    }, 
                    fontFamily: { sans: ["Inter", "sans-serif"] },
                    animation: {
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    }
                } 
            } 
        };
    </script>
    <script src="js/zoi_config.js"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #262931; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #3b3f4a; }

        .glass-panel {
            background: rgba(22, 24, 29, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .table-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .status-glow-available { box-shadow: 0 0 20px -5px rgba(16, 185, 129, 0.2); }
        .status-glow-occupied { box-shadow: 0 0 20px -5px rgba(239, 68, 68, 0.2); }
        .status-glow-reserved { box-shadow: 0 0 20px -5px rgba(245, 158, 11, 0.2); }

        .zone-chip.active {
            background: #00f0ff;
            color: black;
            font-weight: 800;
            box-shadow: 0 4px 15px rgba(0, 240, 255, 0.3);
        }

        @keyframes status-pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }
        .live-dot { animation: status-pulse 2s infinite; }
    </style>
    <script src="global_sidebar.js"></script>
</head>

<body class="bg-bg text-white h-screen flex overflow-hidden font-sans selection:bg-primary selection:text-black">
    <div id="global-sidebar-container" class="shrink-0 z-30"></div>

    <main class="flex-1 flex flex-col h-full overflow-hidden relative">
        <!-- Dashboard Header -->
        <header class="h-20 border-b border-border bg-surface/50 backdrop-blur-xl flex items-center justify-between px-8 z-20">
            <div class="flex items-center gap-6">
                <div>
                    <h1 class="text-2xl font-black tracking-tight text-white flex items-center gap-2">
                        Floor <span class="text-primary tracking-tighter">Command</span>
                    </h1>
                    <div class="flex items-center gap-2 mt-0.5">
                        <span class="size-1.5 rounded-full bg-success live-dot"></span>
                        <span class="text-[10px] font-bold text-gray-500 uppercase tracking-widest">Live Sync Connected</span>
                    </div>
                </div>

                <div class="hidden lg:flex items-center gap-4 border-l border-border pl-6 ml-2">
                    <div class="text-center">
                        <p class="text-[10px] font-bold text-gray-500 uppercase">Total</p>
                        <p class="text-lg font-black text-white" id="stat-total">--</p>
                    </div>
                    <div class="text-center">
                        <p class="text-[10px] font-bold text-success uppercase">Available</p>
                        <p class="text-lg font-black text-success" id="stat-available">--</p>
                    </div>
                    <div class="text-center">
                        <p class="text-[10px] font-bold text-danger uppercase">Occupied</p>
                        <p class="text-lg font-black text-danger" id="stat-occupied">--</p>
                    </div>
                </div>
            </div>

            <div class="flex items-center gap-3">
                <div class="relative group">
                    <span class="material-symbols-outlined absolute left-3 top-2.5 text-gray-500 text-sm group-focus-within:text-primary transition-colors">search</span>
                    <input type="text" id="table-search" placeholder="Quick Find..." onkeyup="renderTables()"
                        class="w-48 bg-black/40 border border-border rounded-xl pl-9 pr-4 py-2 text-xs text-white focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all">
                </div>
                <button onclick="openModal('add-table-modal')"
                    class="h-10 px-5 bg-primary text-black font-black rounded-xl text-xs flex items-center gap-2 hover:scale-[1.02] active:scale-[0.98] transition-all shadow-lg shadow-primary/20">
                    <span class="material-symbols-outlined text-sm">add_circle</span> Add Table
                </button>
                <button onclick="toggleFullScreen()" class="size-10 flex items-center justify-center bg-white/5 border border-white/10 rounded-xl hover:bg-white/10 text-gray-400 hover:text-white transition-all">
                    <span class="material-symbols-outlined">fullscreen</span>
                </button>
            </div>
        </header>

        <!-- Main Workspace -->
        <div class="flex-1 p-8 overflow-y-auto bg-[radial-gradient(#1f2128_1px,transparent_1px)] [background-size:32px_32px]">
            
            <!-- Floor Filters -->
            <div class="mb-8 flex items-center justify-between">
                <div class="flex gap-2 overflow-x-auto pb-2 no-scrollbar" id="zone-container">
                    <!-- Loaded dynamically -->
                </div>
                
                <div class="flex items-center gap-4 bg-surface/50 p-1 rounded-xl border border-white/5">
                    <button onclick="setView('grid')" id="btn-view-grid" class="p-1.5 rounded-lg bg-primary text-black transition-all">
                        <span class="material-symbols-outlined text-sm">grid_view</span>
                    </button>
                    <button onclick="setView('list')" id="btn-view-list" class="p-1.5 rounded-lg text-gray-500 hover:text-white transition-all">
                        <span class="material-symbols-outlined text-sm">view_list</span>
                    </button>
                </div>
            </div>

            <!-- Tables Grid -->
            <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 2xl:grid-cols-8 gap-6" id="table-grid">
                <!-- Skeletons loaded initially -->
                <div class="animate-pulse bg-surface h-40 rounded-2xl border border-border"></div>
                <div class="animate-pulse bg-surface h-40 rounded-2xl border border-border"></div>
                <div class="animate-pulse bg-surface h-40 rounded-2xl border border-border"></div>
                <div class="animate-pulse bg-surface h-40 rounded-2xl border border-border"></div>
            </div>
        </div>
    </main>

    <!-- TABLE ACTIONS MODAL -->
    <div id="table-modal" class="fixed inset-0 z-50 bg-black/80 backdrop-blur-sm hidden flex items-center justify-center p-4">
        <div class="bg-surface border border-border rounded-3xl w-full max-w-md shadow-2xl overflow-hidden scale-up">
            <div class="p-6 border-b border-border flex justify-between items-center">
                <div>
                    <h3 class="text-2xl font-black text-white" id="modal-table-id">Table --</h3>
                    <p class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mt-1" id="modal-floor-name">--</p>
                </div>
                <span id="modal-status-badge" class="px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider">--</span>
            </div>

            <div class="p-8 space-y-6">
                <!-- QR and Fast Actions -->
                <div class="flex gap-6">
                    <div id="table-qr-container" class="size-32 bg-white p-2 rounded-2xl shadow-xl shrink-0 flex items-center justify-center relative group overflow-hidden">
                        <!-- QR Injected Here -->
                        <div class="absolute inset-0 bg-black/60 hidden group-hover:flex items-center justify-center transition-all cursor-pointer" onclick="downloadQR()">
                            <span class="material-symbols-outlined text-white">download</span>
                        </div>
                    </div>
                    <div class="flex-1 space-y-3">
                        <button onclick="goToTablePOS()" class="w-full py-4 bg-primary text-black font-black rounded-2xl text-xs flex items-center justify-center gap-2 hover:opacity-90 transition-all">
                            <span class="material-symbols-outlined">point_of_sale</span> OPEN TERMINAL
                        </button>
                        <div class="grid grid-cols-2 gap-2">
                            <button id="btn-seat" onclick="updateStatus('Occupied')" class="py-3 bg-white/5 border border-white/10 rounded-xl text-[10px] font-bold hover:bg-success hover:text-black transition-all">SEAT</button>
                            <button id="btn-vacate" onclick="updateStatus('Available')" class="py-3 bg-white/5 border border-white/10 rounded-xl text-[10px] font-bold hover:bg-white/10 transition-all">VACATE</button>
                        </div>
                    </div>
                </div>

                <!-- Table Settings -->
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1.5">
                        <label class="text-[10px] font-bold text-gray-500 uppercase">Capacity</label>
                        <input type="number" id="edit-capacity" class="w-full bg-black/40 border border-border rounded-xl px-4 py-3 text-sm text-white focus:border-primary">
                    </div>
                    <div class="space-y-1.5">
                        <label class="text-[10px] font-bold text-gray-500 uppercase">Floor</label>
                        <select id="edit-floor" class="w-full bg-black/40 border border-border rounded-xl px-4 py-3 text-sm text-white focus:border-primary outline-none">
                            <option value="Main Hall">Main Hall</option>
                            <option value="Patio">Patio</option>
                            <option value="VIP">VIP</option>
                        </select>
                    </div>
                </div>

                <div class="flex gap-2 pt-2">
                    <button onclick="saveTableChanges()" class="flex-1 py-3.5 bg-white text-black font-black rounded-2xl text-xs hover:bg-gray-200 transition-all">SAVE CHANGES</button>
                    <button onclick="deleteTable()" class="size-12 flex items-center justify-center bg-danger/10 text-danger border border-danger/20 rounded-2xl hover:bg-danger hover:text-white transition-all">
                        <span class="material-symbols-outlined">delete</span>
                    </button>
                </div>
            </div>
            <button onclick="closeModal('table-modal')" class="w-full py-4 bg-black/20 text-gray-500 text-[10px] font-bold tracking-widest uppercase hover:text-white border-t border-white/5">Close Command</button>
        </div>
    </div>

    <!-- ADD TABLE MODAL -->
    <div id="add-table-modal" class="fixed inset-0 z-[60] bg-black/80 backdrop-blur-sm hidden flex items-center justify-center p-4">
        <div class="bg-surface border border-border rounded-3xl w-full max-w-sm shadow-2xl p-8">
            <h3 class="text-xl font-black text-white mb-6">New Table Connection</h3>
            <div class="space-y-4">
                <div class="space-y-1.5">
                    <label class="text-[10px] font-bold text-gray-500 uppercase tracking-widest pl-1">Table Label</label>
                    <input type="text" id="new-tbl-num" placeholder="E.g. T-10" class="w-full bg-black/40 border border-border rounded-xl px-4 py-3 text-white focus:border-primary text-sm outline-none">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1.5">
                        <label class="text-[10px] font-bold text-gray-500 uppercase tracking-widest pl-1">Capacity</label>
                        <input type="number" id="new-tbl-cap" value="4" class="w-full bg-black/40 border border-border rounded-xl px-4 py-3 text-white focus:border-primary text-sm outline-none">
                    </div>
                    <div class="space-y-1.5">
                        <label class="text-[10px] font-bold text-gray-500 uppercase tracking-widest pl-1">Zone</label>
                        <input type="text" id="new-tbl-zone" value="Main Hall" class="w-full bg-black/40 border border-border rounded-xl px-4 py-3 text-white focus:border-primary text-sm outline-none">
                    </div>
                </div>
            </div>
            <button onclick="confirmAddTable()" class="w-full mt-8 py-4 bg-gradient-to-r from-primary to-orange-600 text-black font-black rounded-2xl text-sm shadow-lg shadow-primary/20 hover:scale-[1.02] active:scale-[0.98] transition-all">
                LINK TABLE
            </button>
            <button onclick="closeModal('add-table-modal')" class="w-full mt-3 py-2 text-gray-500 text-[10px] font-bold uppercase tracking-widest hover:text-white">Cancel</button>
        </div>
    </div>

    <script>
        // CONFIG
        const PARTNER_ID = localStorage.getItem('zoiPartnerInternalId') || '1';
        let tables = [];
        let zones = ["Main Hall", "Patio", "VIP"];
        let currentZone = "Main Hall";
        let activeTable = null;
        let viewMode = 'grid';

        // SYNC
        async function fetchTables() {
            try {
                const res = await fetch(`${ZOI_CONFIG.API_BASE_URL}/tables?restaurantId=${PARTNER_ID}`);
                const data = await res.json();
                tables = data.data || data; // Handle both direct array and {data: []}
                
                // Update Zones based on loaded tables plus defaults
                const tableZones = Array.from(new Set(tables.map(t => t.tableNumber.includes('P') ? 'Patio' : (t.tableNumber.includes('V') ? 'VIP' : 'Main Hall'))));
                // In a real app, zones would also be a model. For now, we use the property or defaults.
                
                updateStats();
                renderZones();
                renderTables();
            } catch (e) {
                console.error("Sync Error", e);
                showToast("Connection Lost", "Failed to sync tables with server", "danger");
            }
        }

        function updateStats() {
            document.getElementById('stat-total').innerText = tables.length;
            document.getElementById('stat-available').innerText = tables.filter(t => t.status === 'Available').length;
            document.getElementById('stat-occupied').innerText = tables.filter(t => t.status !== 'Available').length;
        }

        function renderZones() {
            const container = document.getElementById('zone-container');
            container.innerHTML = zones.map(z => `
                <button onclick="setZone('${z}')" class="zone-chip px-5 py-2.5 bg-surface text-gray-500 rounded-xl text-xs transition-all border border-white/5 whitespace-nowrap ${currentZone === z ? 'active' : ''}">
                    ${z.toUpperCase()}
                </button>
            `).join('');
        }

        function renderTables() {
            const grid = document.getElementById('table-grid');
            const search = document.getElementById('table-search').value.toLowerCase();
            
            // Filter by zone and search
            // NOTE: In this demo model, we infer zone from table label or let it be 'Main Hall'
            const filtered = tables.filter(t => {
                const matchesSearch = t.tableNumber.toLowerCase().includes(search);
                // Simple zone logic for better UX in this template
                let tZone = "Main Hall";
                if(t.tableNumber.startsWith('P')) tZone = "Patio";
                if(t.tableNumber.startsWith('V')) tZone = "VIP";
                
                return matchesSearch && tZone === currentZone;
            });

            if (filtered.length === 0) {
                grid.innerHTML = `<div class="col-span-full py-20 text-center text-gray-500 font-bold uppercase tracking-widest text-xs">No tables found in ${currentZone}</div>`;
                return;
            }

            grid.innerHTML = filtered.map(t => {
                const isOccupied = t.status === 'Occupied';
                const colorClass = isOccupied ? 'danger' : 'success';
                const shadowClass = isOccupied ? 'status-glow-occupied' : 'status-glow-available';
                
                return `
                <div onclick="openTableCommand(${t.id})" class="table-card bg-surface border-t-2 border-${colorClass} rounded-2xl p-5 h-44 flex flex-col justify-between shadow-xl cursor-pointer hover:-translate-y-2 relative overflow-hidden group ${shadowClass}">
                    <div class="absolute inset-0 bg-${colorClass}/5 opacity-0 group-hover:opacity-100 transition-opacity"></div>
                    
                    <div class="flex justify-between items-start z-10">
                        <div>
                            <p class="text-[28px] font-black text-white leading-none">${t.tableNumber}</p>
                            <p class="text-[9px] font-bold text-gray-500 uppercase tracking-widest mt-1">${currentZone}</p>
                        </div>
                        <span class="text-[8px] bg-${colorClass}/20 text-${colorClass} px-2 py-0.5 rounded-full font-black uppercase tracking-wider">${t.status}</span>
                    </div>

                    <div class="z-10 bg-black/20 rounded-xl p-2 border border-white/5 backdrop-blur-sm">
                        <div class="flex items-center gap-1.5 text-[10px] text-gray-400 font-bold">
                            <span class="material-symbols-outlined text-sm">group</span>
                            ${t.capacity} SEATS
                        </div>
                        ${isOccupied ? `
                        <div class="flex items-center gap-1.5 text-[10px] text-primary font-bold mt-1">
                            <span class="material-symbols-outlined text-sm">shopping_cart</span>
                            SESSION ACTIVE
                        </div>` : ''}
                    </div>
                </div>
                `;
            }).join('');
        }

        // MODAL LOGIC
        function openTableCommand(id) {
            activeTable = tables.find(t => t.id === id);
            if (!activeTable) return;

            document.getElementById('modal-table-id').innerText = `Table ${activeTable.tableNumber}`;
            document.getElementById('modal-floor-name').innerText = currentZone;
            document.getElementById('edit-capacity').value = activeTable.capacity;
            document.getElementById('edit-floor').value = currentZone;

            const badge = document.getElementById('modal-status-badge');
            badge.innerText = activeTable.status;
            badge.className = `px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider ${activeTable.status === 'Occupied' ? 'bg-danger/20 text-danger' : 'bg-success/20 text-success'}`;

            // Generate QR
            const qrContainer = document.getElementById('table-qr-container');
            qrContainer.innerHTML = '';
            new QRCode(qrContainer, {
                text: `${window.location.origin}/restaurant_pos_terminal.html?table=${activeTable.tableNumber}`,
                width: 112,
                height: 112,
                colorDark: "#000000",
                colorLight: "#ffffff",
                correctLevel: QRCode.CorrectLevel.H
            });

            openModal('table-modal');
        }

        async function updateStatus(status) {
            if (!activeTable) return;
            try {
                const res = await fetch(`${ZOI_CONFIG.API_BASE_URL}/tables/${activeTable.id}`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status })
                });
                if (res.ok) {
                    showToast("Success", `Table ${activeTable.tableNumber} is now ${status}`);
                    fetchTables();
                    closeModal('table-modal');
                }
            } catch (e) { console.error(e); }
        }

        async function saveTableChanges() {
            if (!activeTable) return;
            const updates = {
                capacity: parseInt(document.getElementById('edit-capacity').value)
            };
            try {
                const res = await fetch(`${ZOI_CONFIG.API_BASE_URL}/tables/${activeTable.id}`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(updates)
                });
                if (res.ok) {
                    showToast("Updated", "Table configuration saved");
                    fetchTables();
                    closeModal('table-modal');
                }
            } catch (e) { console.error(e); }
        }

        async function confirmAddTable() {
            const num = document.getElementById('new-tbl-num').value;
            const cap = parseInt(document.getElementById('new-tbl-cap').value);
            const zone = document.getElementById('new-tbl-zone').value;

            if (!num) return showToast("Error", "Missing table label", "danger");

            const payload = {
                restaurantId: parseInt(PARTNER_ID),
                tableNumber: num,
                capacity: cap,
                status: 'Available'
            };

            try {
                const res = await fetch(`${ZOI_CONFIG.API_BASE_URL}/tables`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (res.ok) {
                    showToast("Linked", `Table ${num} added to ${zone}`);
                    fetchTables();
                    closeModal('add-table-modal');
                } else {
                    const err = await res.json();
                    showToast("Error", err.error || "Failed to add table", "danger");
                }
            } catch (e) { console.error(e); }
        }

        async function deleteTable() {
            if (!activeTable) return;
            if (!confirm(`Permanently remove Table ${activeTable.tableNumber}?`)) return;

            try {
                const res = await fetch(`${ZOI_CONFIG.API_BASE_URL}/tables/${activeTable.id}`, {
                    method: 'DELETE'
                });
                if (res.ok) {
                    showToast("Removed", "Table connection deleted");
                    fetchTables();
                    closeModal('table-modal');
                }
            } catch (e) { console.error(e); }
        }

        // VIEW UTILS
        function setZone(z) { currentZone = z; renderZones(); renderTables(); }
        function setView(v) { 
            viewMode = v;
            document.getElementById('btn-view-grid').className = v === 'grid' ? 'p-1.5 rounded-lg bg-primary text-black transition-all' : 'p-1.5 rounded-lg text-gray-500 hover:text-white transition-all';
            document.getElementById('btn-view-list').className = v === 'list' ? 'p-1.5 rounded-lg bg-primary text-black transition-all' : 'p-1.5 rounded-lg text-gray-500 hover:text-white transition-all';
            // List view logic would go here if needed
        }

        function openModal(id) { 
            const m = document.getElementById(id);
            m.classList.remove('hidden');
            m.classList.add('flex');
            setTimeout(() => m.querySelector('.scale-up')?.classList.add('scale-100'), 10);
        }
        function closeModal(id) { 
            document.getElementById(id).classList.add('hidden');
            document.getElementById(id).classList.remove('flex');
        }
        function goToTablePOS() { window.location.href = `restaurant_pos_terminal.html?table=${activeTable.tableNumber}`; }
        function toggleFullScreen() {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen();
            else document.exitFullscreen();
        }

        function showToast(title, msg, type = 'success') {
            const t = document.createElement('div');
            t.className = `fixed bottom-10 right-10 glass-panel border border-${type} px-6 py-4 rounded-2xl shadow-2xl z-[1000] translate-y-20 opacity-0 transition-all duration-500`;
            t.innerHTML = `
                <div class="flex items-center gap-4">
                    <span class="material-symbols-outlined text-${type}">${type === 'success' ? 'check_circle' : 'error'}</span>
                    <div>
                        <p class="text-sm font-black text-white">${title}</p>
                        <p class="text-[10px] text-gray-400 font-bold uppercase">${msg}</p>
                    </div>
                </div>
            `;
            document.body.appendChild(t);
            setTimeout(() => { t.classList.remove('translate-y-20', 'opacity-0'); }, 100);
            setTimeout(() => { 
                t.classList.add('translate-y-20', 'opacity-0'); 
                setTimeout(() => t.remove(), 500);
            }, 4000);
        }

        function downloadQR() {
            const canvas = document.querySelector('#table-qr-container canvas');
            if (!canvas) return;
            const link = document.createElement('a');
            link.download = `QR_Table_${activeTable.tableNumber}.png`;
            link.href = canvas.toDataURL();
            link.click();
        }

        // INIT
        window.onload = () => {
            fetchTables();
            renderZones();
            setInterval(fetchTables, 10000); // Live Sync
        };
    </script>
<script src="js/zoi_theme.js"></script>
    <script src="js/zoi_pwa.js"></script>
</body>

</html>
