<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#00f0ff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>ZoiEats — You're Offline</title>
    <meta name="description" content="You're offline. ZipZapZoi Eats will reconnect when your internet is back.">
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Quicksand', sans-serif; background: #0a0314; color: #fff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 2rem; }
        .icon { width: 120px; height: 120px; margin: 0 auto 2rem; border-radius: 50%; background: linear-gradient(135deg, rgba(0,240,255,0.15), rgba(255,0,255,0.1)); border: 2px solid rgba(0,240,255,0.3); display: flex; align-items: center; justify-content: center; font-size: 3rem; animation: pulse 2s ease-in-out infinite; }
        @keyframes pulse { 0%,100% { transform: scale(1); box-shadow: 0 0 30px rgba(0,240,255,0.2); } 50% { transform: scale(1.05); box-shadow: 0 0 50px rgba(0,240,255,0.4); } }
        h1 { font-size: 2rem; font-weight: 700; margin-bottom: 0.5rem; }
        h1 span { color: #00f0ff; }
        p { color: #b4a5d8; font-size: 1rem; max-width: 400px; margin: 0.5rem auto 2rem; line-height: 1.6; }
        .btn { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.875rem 2rem; background: linear-gradient(135deg, #00f0ff, #ff00ff); color: #0a0314; font-weight: 700; font-size: 1rem; border: none; border-radius: 1rem; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; text-decoration: none; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(0,240,255,0.3); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .info-card { margin-top: 1.5rem; padding: 1.25rem; border: 1px solid rgba(0,240,255,0.2); border-radius: 1rem; background: rgba(26,11,54,0.5); max-width: 400px; width: 100%; text-align: left; }
        .info-card h3 { font-size: 0.875rem; color: #00f0ff; margin-bottom: 0.75rem; display: flex; align-items: center; gap: 0.5rem; }
        .info-card p, .info-card .item { font-size: 0.75rem; color: #b4a5d8; margin: 0; }
        .info-card .item { display: flex; justify-content: space-between; padding: 0.375rem 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .info-card .item:last-child { border-bottom: none; }
        .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; animation: blink 1.5s ease-in-out infinite; }
        .status-dot.offline { background: #ef4444; }
        .status-dot.checking { background: #eab308; }
        .status-dot.online { background: #22c55e; }
        @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
        .retry-text { font-size: 0.75rem; color: #666; margin-top: 0.75rem; }
    </style>
</head>
<body>
    <div class="icon" id="status-icon">📡</div>
    <h1>You're <span>Offline</span></h1>
    <p>It seems you've lost your internet connection. Don't worry — your cart and orders are saved locally.</p>
    
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:1.5rem">
        <span class="status-dot offline" id="conn-dot"></span>
        <span style="font-size:0.8rem;color:#b4a5d8" id="conn-text">No connection detected</span>
    </div>
    
    <button class="btn" id="retry-btn" onclick="attemptRetry()">↻ Try Again</button>
    <p class="retry-text" id="retry-info"></p>

    <div class="info-card" id="cart-card" style="display:none">
        <h3>🛒 Your Saved Cart</h3>
        <div id="cart-items"></div>
    </div>

    <div class="info-card" id="orders-card" style="display:none">
        <h3>📦 Recent Orders</h3>
        <div id="order-items"></div>
    </div>

    <script>
        let retryCount = 0;
        const maxRetry = 5;

        // Load saved cart
        try {
            const cart = JSON.parse(localStorage.getItem('zoiCart') || '[]');
            if (cart.length > 0) {
                document.getElementById('cart-card').style.display = 'block';
                document.getElementById('cart-items').innerHTML = cart.map(i =>
                    `<div class="item"><span>${i.qty || 1}× ${i.name || i.itemName || 'Item'}</span><span style="color:#00f0ff">₹${i.price || 0}</span></div>`
                ).join('') + `<div class="item" style="border-top:1px solid rgba(0,240,255,0.2);padding-top:0.5rem;margin-top:0.25rem;font-weight:700;color:#fff"><span>Total (${cart.length} items)</span><span style="color:#00f0ff">₹${cart.reduce((s,i) => s + (i.price||0) * (i.qty||1), 0)}</span></div>`;
            }
        } catch(e) {}

        // Load saved orders
        try {
            const orders = JSON.parse(localStorage.getItem('zoiOrderHistory') || '[]').slice(0, 3);
            if (orders.length > 0) {
                document.getElementById('orders-card').style.display = 'block';
                document.getElementById('order-items').innerHTML = orders.map(o => {
                    const status = o.status || 'Unknown';
                    const statusColor = { Delivered: '#22c55e', Preparing: '#eab308', Pending: '#00f0ff' }[status] || '#b4a5d8';
                    return `<div class="item"><span>#${(o.id || o.zoiId || '').toString().slice(-6)}</span><span style="color:${statusColor}">${status}</span></div>`;
                }).join('');
            }
        } catch(e) {}

        // Auto-retry with exponential backoff
        function attemptRetry() {
            const btn = document.getElementById('retry-btn');
            const dot = document.getElementById('conn-dot');
            const text = document.getElementById('conn-text');

            btn.disabled = true;
            btn.innerHTML = '⏳ Checking...';
            dot.className = 'status-dot checking';
            text.textContent = 'Checking connection...';

            fetch('/index.html', { cache: 'no-store' })
                .then(r => {
                    if (r.ok) {
                        dot.className = 'status-dot online';
                        text.textContent = 'Connection restored!';
                        btn.innerHTML = '✓ Connected!';
                        document.getElementById('status-icon').textContent = '🎉';
                        setTimeout(() => location.reload(), 500);
                    } else { throw new Error('Not OK'); }
                })
                .catch(() => {
                    retryCount++;
                    dot.className = 'status-dot offline';
                    text.textContent = 'Still offline';
                    btn.disabled = false;
                    btn.innerHTML = '↻ Try Again';

                    if (retryCount < maxRetry) {
                        const delay = Math.min(2000 * Math.pow(2, retryCount), 30000);
                        document.getElementById('retry-info').textContent = `Auto-retrying in ${Math.round(delay/1000)}s... (attempt ${retryCount}/${maxRetry})`;
                        setTimeout(attemptRetry, delay);
                    } else {
                        document.getElementById('retry-info').textContent = 'Max retries reached. Please check your connection manually.';
                    }
                });
        }

        // Start auto-retry after 5 seconds
        setTimeout(attemptRetry, 5000);

        // Listen for online event
        window.addEventListener('online', () => location.reload());
    </script>
</body>
</html>
