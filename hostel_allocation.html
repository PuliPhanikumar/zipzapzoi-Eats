<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00f0ff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Room Allocation - Zoi Hostel POS</title>
    <meta name="description" content="Manage room allocation and bed assignments on ZipZapZoi hostel platform.">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="hostel_shared.js"></script>
    <script>tailwind.config = { darkMode: "class", theme: { extend: { colors: { teal: "#00D4C5", bg: "#0B0C10", surface: "#1A1B23", border: "rgba(255,255,255,0.05)" }, fontFamily: { sans: ["Manrope", "sans-serif"] } } } }</script>
    <style>
        .glass-panel {
            background: rgba(26, 27, 35, 0.7);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border-radius: 1.5rem;
        }

        .bouncy-card {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .bouncy-card:hover {
            transform: translateY(-4px) scale(1.01);
        }

        body {
            background: radial-gradient(circle at 10% 20%, rgb(20, 20, 30) 0%, rgb(11, 12, 16) 90%);
        }

        ::-webkit-scrollbar {
            width: 5px;
        }

        ::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 10px;
        }

        @keyframes fadeUp {
            0% {
                opacity: 0;
                transform: translateY(8px);
            }

            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-row {
            animation: fadeUp 0.3s ease forwards;
        }

        .bed-cell {
            transition: all 0.3s;
            cursor: pointer;
            min-height: 48px;
        }

        .bed-cell:hover {
            transform: scale(1.05);
            z-index: 10;
        }
    </style>
    <script src="global_sidebar.js"></script>
    <script src="js/zoi_config.js"></script>
</head>

<body class="text-white h-screen overflow-hidden flex font-sans antialiased selection:bg-pink-500/30">
    <div id="global-sidebar-container" class="shrink-0 z-30"></div>

    <main class="flex-1 flex flex-col h-screen overflow-hidden">
        <header class="h-20 flex items-center justify-between px-8 border-b border-border/50 flex-shrink-0">
            <div>
                <h2 class="text-2xl font-extrabold flex items-center gap-2">Room Allocation Matrix <span
                        class="material-symbols-outlined text-pink-500 text-3xl">grid_on</span></h2>
                <p class="text-gray-400 text-sm">Visual floor-plan grid showing every bed with color-coded status &
                    hosteler assignment.</p>
            </div>
            <div class="flex items-center gap-3">
                <div class="flex gap-1.5 text-[9px]">
                    <span class="flex items-center gap-1"><span
                            class="h-3 w-3 rounded bg-red-500/60"></span>Occupied</span>
                    <span class="flex items-center gap-1"><span
                            class="h-3 w-3 rounded bg-green-500/60"></span>Vacant</span>
                    <span class="flex items-center gap-1"><span
                            class="h-3 w-3 rounded bg-amber-500/60"></span>Reserved</span>
                    <span class="flex items-center gap-1"><span
                            class="h-3 w-3 rounded bg-gray-500/60"></span>Maintenance</span>
                    <span class="flex items-center gap-1"><span
                            class="h-3 w-3 rounded bg-violet-500/60"></span>Damaged</span>
                </div>
            </div>
        </header>

        <!-- Floor Selector + Stats -->
        <div class="px-8 py-3 border-b border-border/30 flex items-center gap-4 flex-shrink-0">
            <div class="flex gap-1.5">
                <button class="floor-btn px-4 py-2 bg-pink-500 text-white rounded-lg text-xs font-bold" data-floor="1"
                    onclick="switchFloor(1)">Floor 1</button>
                <button class="floor-btn px-4 py-2 bg-white/10 text-gray-400 rounded-lg text-xs font-bold"
                    data-floor="2" onclick="switchFloor(2)">Floor 2</button>
                <button class="floor-btn px-4 py-2 bg-white/10 text-gray-400 rounded-lg text-xs font-bold"
                    data-floor="3" onclick="switchFloor(3)">Floor 3</button>
            </div>
            <div class="ml-auto flex gap-4 text-xs">
                <span class="text-gray-400">Total Beds: <strong class="text-white" id="f-total">0</strong></span>
                <span class="text-gray-400">Occupied: <strong class="text-red-400" id="f-occ">0</strong></span>
                <span class="text-gray-400">Vacant: <strong class="text-green-400" id="f-vac">0</strong></span>
                <span class="text-gray-400">Occupancy: <strong class="text-pink-400" id="f-pct">0%</strong></span>
            </div>
        </div>

        <div class="flex-1 overflow-y-auto p-8 pb-24" id="floor-grid"></div>
    </main>

    <!-- BED DETAIL MODAL -->
    <div id="bed-modal" class="fixed inset-0 bg-black/70 backdrop-blur-sm z-50 hidden items-center justify-center p-4">
        <div class="glass-panel w-full max-w-sm p-0">
            <div class="p-5 border-b border-border flex justify-between items-center">
                <h3 class="font-bold text-lg text-white" id="bm-title">Bed Details</h3><button onclick="closeBedModal()"
                    class="p-1 hover:bg-white/10 rounded-lg text-gray-400 hover:text-white"><span
                        class="material-symbols-outlined">close</span></button>
            </div>
            <div class="p-5" id="bm-body"></div>
            <div class="p-4 border-t border-border flex gap-2" id="bm-actions"></div>
        </div>
    </div>

    <script>
        let FLOORS = ZoiDB.get('floors_allocation', {
            1: [
                { room: '101', type: 'Executive AC', beds: [{ id: '101-A', status: 'occupied', hosteler: 'Ravi Kumar' }, { id: '101-B', status: 'vacant', hosteler: null }] },
                { room: '102', type: 'AC Double', beds: [{ id: '102-A', status: 'occupied', hosteler: 'Deepak S.' }, { id: '102-B', status: 'occupied', hosteler: 'Rahul Kumar' }] },
                { room: '103', type: 'Non-AC Triple', beds: [{ id: '103-A', status: 'occupied', hosteler: 'Kiran R.' }, { id: '103-B', status: 'vacant', hosteler: null }, { id: '103-C', status: 'reserved', hosteler: '(Booking)' }] },
                { room: '104', type: 'Dormitory', beds: [{ id: '104-A', status: 'occupied', hosteler: 'Sunil P.' }, { id: '104-B', status: 'occupied', hosteler: 'Vamsi K.' }, { id: '104-C', status: 'maintenance', hosteler: null }, { id: '104-D', status: 'vacant', hosteler: null }] },
                { room: '105', type: 'Non-AC Double', beds: [{ id: '105-A', status: 'occupied', hosteler: 'Arun M.' }, { id: '105-B', status: 'damaged', hosteler: null }] },
            ],
            2: [
                { room: '201', type: 'Executive AC', beds: [{ id: '201-A', status: 'occupied', hosteler: 'Sanjay V.' }, { id: '201-B', status: 'vacant', hosteler: null }] },
                { room: '202', type: 'AC Double', beds: [{ id: '202-A', status: 'occupied', hosteler: 'Vikram R.' }, { id: '202-B', status: 'occupied', hosteler: 'Manoj S.' }] },
                { room: '203', type: 'AC Triple', beds: [{ id: '203-A', status: 'vacant', hosteler: null }, { id: '203-B', status: 'occupied', hosteler: 'Gopal K.' }, { id: '203-C', status: 'occupied', hosteler: 'Ramesh P.' }] },
                { room: '204', type: 'Non-AC Double', beds: [{ id: '204-A', status: 'maintenance', hosteler: null }, { id: '204-B', status: 'occupied', hosteler: 'Priya A.' }] },
            ],
            3: [
                { room: '301', type: 'AC Triple', beds: [{ id: '301-A', status: 'occupied', hosteler: 'Priya S.' }, { id: '301-B', status: 'occupied', hosteler: 'Sneha Sharma' }, { id: '301-C', status: 'vacant', hosteler: null }] },
                { room: '302', type: 'Non-AC Double', beds: [{ id: '302-A', status: 'occupied', hosteler: 'Lakshmi D.' }, { id: '302-B', status: 'reserved', hosteler: '(Advance)' }] },
                { room: '303', type: 'Dormitory', beds: [{ id: '303-A', status: 'occupied', hosteler: 'Anita K.' }, { id: '303-B', status: 'vacant', hosteler: null }, { id: '303-C', status: 'occupied', hosteler: 'Divya M.' }, { id: '303-D', status: 'vacant', hosteler: null }, { id: '303-E', status: 'occupied', hosteler: 'Meera S.' }, { id: '303-F', status: 'damaged', hosteler: null }] },
            ]
        });

        const STATUS_COLORS = { occupied: 'red', vacant: 'green', reserved: 'amber', maintenance: 'gray', damaged: 'violet' };
        const STATUS_ICONS = { occupied: 'person', vacant: 'check_circle', reserved: 'event', maintenance: 'build', damaged: 'dangerous' };
        let currentFloor = 1;

        function switchFloor(f) {
            currentFloor = f;
            document.querySelectorAll('.floor-btn').forEach(b => { b.className = `floor-btn px-4 py-2 ${parseInt(b.dataset.floor) === f ? 'bg-pink-500 text-white' : 'bg-white/10 text-gray-400'} rounded-lg text-xs font-bold`; });
            renderFloor();
        }

        function renderFloor() {
            const rooms = FLOORS[currentFloor];
            let totalBeds = 0, occ = 0, vac = 0;
            rooms.forEach(r => { r.beds.forEach(b => { totalBeds++; if (b.status === 'occupied') occ++; if (b.status === 'vacant') vac++; }); });
            document.getElementById('f-total').innerText = totalBeds;
            document.getElementById('f-occ').innerText = occ;
            document.getElementById('f-vac').innerText = vac;
            document.getElementById('f-pct').innerText = Math.round((occ / totalBeds) * 100) + '%';

            document.getElementById('floor-grid').innerHTML = `<div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-5">${rooms.map((r, ri) => {
                return `<div class="glass-panel p-0 overflow-hidden bouncy-card fade-row" style="animation-delay:${ri * 60}ms">
                    <div class="p-4 border-b border-border flex items-center justify-between">
                        <div><h4 class="font-bold text-white text-sm">Room ${r.room}</h4><p class="text-[10px] text-gray-500">${r.type} � ${r.beds.length} Beds</p></div>
                        <span class="text-[10px] font-bold px-2 py-0.5 rounded bg-white/10 text-gray-400">${r.beds.filter(b => b.status === 'occupied').length}/${r.beds.length} Full</span>
                    </div>
                    <div class="p-4 grid grid-cols-${Math.min(r.beds.length, 3)} gap-2">
                        ${r.beds.map(b => {
                    const c = STATUS_COLORS[b.status]; const ic = STATUS_ICONS[b.status];
                    return `<div class="bed-cell bg-${c}-500/15 border border-${c}-500/30 rounded-xl p-3 text-center" onclick="showBed('${b.id}',${currentFloor})">
                                <span class="material-symbols-outlined text-${c}-400 text-lg block">${ic}</span>
                                <p class="text-[10px] font-bold text-${c}-400 mt-0.5">${b.id.split('-')[1]}</p>
                                <p class="text-[9px] text-gray-400 truncate">${b.hosteler || '�'}</p>
                            </div>`;
                }).join('')}
                    </div>
                </div>`;
            }).join('')}</div>`;
        }

        function showBed(bedId, floor) {
            const rooms = FLOORS[floor];
            let bed = null, room = null;
            rooms.forEach(r => r.beds.forEach(b => { if (b.id === bedId) { bed = b; room = r; } }));
            if (!bed) return;
            const c = STATUS_COLORS[bed.status];
            document.getElementById('bm-title').innerText = `Bed ${bedId} � Room ${room.room}`;
            document.getElementById('bm-body').innerHTML = `
                <div class="text-center mb-4"><span class="inline-block px-3 py-1 bg-${c}-500/20 text-${c}-400 rounded-lg text-xs font-bold capitalize">${bed.status}</span></div>
                <div class="grid grid-cols-2 gap-2 text-xs">
                    <div class="p-2.5 bg-white/[0.03] rounded-lg"><span class="text-gray-500 block mb-0.5">Room</span><span class="text-white font-bold">${room.room} (${room.type})</span></div>
                    <div class="p-2.5 bg-white/[0.03] rounded-lg"><span class="text-gray-500 block mb-0.5">Bed ID</span><span class="text-white font-bold">${bedId}</span></div>
                    <div class="p-2.5 bg-white/[0.03] rounded-lg col-span-2"><span class="text-gray-500 block mb-0.5">Hosteler</span><span class="text-white font-bold">${bed.hosteler || 'No one assigned'}</span></div>
                </div>`;
            let actions = `<button onclick="closeBedModal()" class="flex-1 py-2.5 text-xs font-bold text-gray-300 bg-white/5 border border-white/10 rounded-xl">Close</button>`;
            if (bed.status === 'occupied') actions += `<button onclick="vacateBed('${bedId}',${floor})" class="flex-1 py-2.5 text-xs font-bold text-amber-400 bg-amber-500/10 border border-amber-500/30 rounded-xl">Vacate</button>`;
            if (bed.status === 'vacant') actions += `<button onclick="assignBed('${bedId}',${floor})" class="flex-1 py-2.5 text-xs font-bold text-green-400 bg-green-500/10 border border-green-500/30 rounded-xl">Assign</button>`;
            if (bed.status === 'maintenance' || bed.status === 'damaged') actions += `<button onclick="fixBed('${bedId}',${floor})" class="flex-1 py-2.5 text-xs font-bold text-teal bg-teal/10 border border-teal/30 rounded-xl">Mark Ready</button>`;
            document.getElementById('bm-actions').innerHTML = actions;
            document.getElementById('bed-modal').classList.remove('hidden'); document.getElementById('bed-modal').classList.add('flex');
        }

        function closeBedModal() { document.getElementById('bed-modal').classList.add('hidden'); document.getElementById('bed-modal').classList.remove('flex'); }
        function vacateBed(id, f) {
            const rooms = FLOORS[f];
            rooms.forEach(r => r.beds.forEach(b => { if (b.id === id) { b.status = 'vacant'; b.hosteler = null; } }));
            ZoiDB.set('floors_allocation', FLOORS);
            closeBedModal(); renderFloor();
            showToast(`Bed ${id} vacated successfully.`, 'success');
        }
        function assignBed(id, f) {
            const name = prompt('Enter hosteler name:');
            if (!name) return;
            const rooms = FLOORS[f];
            rooms.forEach(r => r.beds.forEach(b => { if (b.id === id) { b.status = 'occupied'; b.hosteler = name; } }));
            ZoiDB.set('floors_allocation', FLOORS);
            closeBedModal(); renderFloor();
            showToast(`Bed ${id} assigned to ${name}.`, 'success');
        }
        function fixBed(id, f) {
            const rooms = FLOORS[f];
            rooms.forEach(r => r.beds.forEach(b => { if (b.id === id) { b.status = 'vacant'; b.hosteler = null; } }));
            ZoiDB.set('floors_allocation', FLOORS);
            closeBedModal(); renderFloor();
            showToast(`Bed ${id} marked ready for use.`, 'success');
        }

        document.addEventListener('DOMContentLoaded', () => { 
            try { if (window.ZoiAuth) ZoiAuth.enforceAccess(); } catch(e) {}
            renderFloor(); 
        });
    </script>

    <script src="js/zoi_ai_assistant.js?v=4"></script>

<script src="js/zoi_theme.js?v=5"></script>
    <script src="js/zoi_pwa.js"></script>

    <script src="js/zoi_mobile.js"></script>
</body>

</html>
