<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00f0ff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>ZipZapZoi - Access Denied</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#39E079',
                        warning: '#00f0ff',
                        danger: '#EF4444',
                        bg: '#0F1115',
                        surface: '#1A1D24',
                        border: '#2A2E39'
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"
        rel="stylesheet" />
    <style>
        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: #0F1115;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .glitch-text {
            position: relative;
            display: inline-block;
            font-weight: bold;
        }

        .glitch-text::before,
        .glitch-text::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.8;
        }

        .glitch-text::before {
            left: 2px;
            text-shadow: -1px 0 red;
            clip: rect(24px, 550px, 90px, 0);
            animation: glitch-anim-2 3s infinite linear alternate-reverse;
        }

        .glitch-text::after {
            left: -2px;
            text-shadow: -1px 0 blue;
            clip: rect(85px, 550px, 140px, 0);
            animation: glitch-anim 2.5s infinite linear alternate-reverse;
        }

        @keyframes glitch-anim {
            0% { clip: rect(48px, 9999px, 81px, 0); }
            20% { clip: rect(32px, 9999px, 18px, 0); }
            40% { clip: rect(12px, 9999px, 98px, 0); }
            60% { clip: rect(98px, 9999px, 64px, 0); }
            80% { clip: rect(2px, 9999px, 12px, 0); }
            100% { clip: rect(54px, 9999px, 44px, 0); }
        }

        @keyframes glitch-anim-2 {
            0% { clip: rect(65px, 9999px, 100px, 0); }
            20% { clip: rect(20px, 9999px, 85px, 0); }
            40% { clip: rect(8px, 9999px, 2px, 0); }
            60% { clip: rect(88px, 9999px, 15px, 0); }
            80% { clip: rect(5px, 9999px, 75px, 0); }
            100% { clip: rect(44px, 9999px, 20px, 0); }
        }
    </style>
    <script src="global_sidebar.js"></script>
</head>

<body>
    <div class="text-center relative z-10 w-full max-w-md p-8">
        <!-- Animated Lock Icon -->
        <div class="mb-8 flex justify-center">
            <div
                class="relative size-24 bg-danger/10 border border-danger/30 rounded-full flex items-center justify-center shadow-[0_0_50px_rgba(239,68,68,0.2)]">
                <span class="material-symbols-outlined text-[48px] text-danger animate-pulse">lock</span>
                <div class="absolute inset-0 border-2 border-danger rounded-full animate-ping opacity-20"></div>
            </div>
        </div>

        <!-- 403 Error -->
        <h1 class="text-7xl font-bold mb-2 glitch-text text-white" data-text="403">403</h1>
        <h2 class="text-2xl font-bold text-gray-300 mb-6 tracking-wide">ACCESS DENIED</h2>

        <!-- Contextual Message -->
        <div class="bg-surface/50 border border-border rounded-lg p-4 mb-8 text-left">
            <p class="text-xs text-gray-400 font-mono mb-2">// ERROR_CODE: INSUFFICIENT_CLEARANCE</p>
            <p class="text-sm text-gray-300">Your current role <span id="current-role"
                    class="text-primary font-bold px-1.5 py-0.5 bg-primary/10 rounded">User</span> does not have
                authorization to view this secure sector.</p>
        </div>

        <!-- Return Actions -->
        <div class="flex flex-col gap-3" id="action-buttons">
            <button onclick="window.history.back()"
                class="w-full py-3 rounded-lg bg-primary hover:bg-primary/90 text-black font-bold shadow-[0_0_15px_rgba(57,224,121,0.3)] transition-all flex items-center justify-center gap-2">
                <span class="material-symbols-outlined text-lg">arrow_back</span> Return to Safety
            </button>
            <a href="admin manager dashboard.html" id="dashboard-link"
                class="w-full py-3 rounded-lg border border-border text-gray-400 font-bold hover:text-white hover:bg-white/5 transition-colors flex items-center justify-center gap-2">
                <span class="material-symbols-outlined text-lg">admin_panel_settings</span> Go to Dashboard
            </a>
            <p class="text-xs text-gray-500 mt-2 font-mono" id="auto-redirect-timer"></p>
        </div>
    </div>

    <!-- Background Decoration -->
    <div class="fixed inset-0 pointer-events-none overflow-hidden">
        <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-danger/5 rounded-full blur-[100px]"></div>
        <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-primary/5 rounded-full blur-[100px]"></div>
        <div
            class="absolute inset-0 bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0IiBoZWlnaHQ9IjQiPjxyZWN0IHdpZHRoPSI0IiBoZWlnaHQ9IjQiIGZpbGw9IiNmZmYiIGZpbGwtb3BhY2l0eT0iMC4wNSIvPjwvc3ZnPg==')] opacity-20">
        </div>
    </div>

    <script src="js/zoi_config.js"></script>
    <script src="js/db_simulation.js"></script>
    <script src="js/zoi_api.js"></script>
    <script>
        // Guarded auth init
        let role = 'Unknown';
        try {
            ZoiAuth.init();
            role = ZoiAuth.getCurrentUser().role || 'Unknown';
        } catch(e) {
            console.warn('[ZOI] Auth unavailable on 403 page:', e.message);
        }
        document.getElementById('current-role').innerText = role;

        // Role-based dashboard link
        const roleRedirects = {
            'admin': 'admin console dashboard V2.html',
            'manager': 'admin manager dashboard.html',
            'restaurant': 'restaurant_partner_dashboard.html',
            'rider': 'rider_dashboard.html',
            'warden': 'hostel_pos_dashboard.html'
        };
        const dashTarget = roleRedirects[role] || 'index.html';
        document.getElementById('dashboard-link').href = dashTarget;

        // Auto-redirect countdown (10 seconds)
        let countdown = 10;
        const timerEl = document.getElementById('auto-redirect-timer');
        timerEl.innerText = `Auto-redirecting in ${countdown}s...`;

        const redirectInterval = setInterval(() => {
            countdown--;
            timerEl.innerText = `Auto-redirecting in ${countdown}s...`;
            if (countdown <= 0) {
                clearInterval(redirectInterval);
                window.location.href = dashTarget;
            }
        }, 1000);
    </script>

    <script src="js/zoi_ai_assistant.js?v=4"></script>
    <script src="js/zoi_theme.js?v=5"></script>
    <script src="js/zoi_pwa.js"></script>

    <script src="js/zoi_mobile.js"></script>
</body>

</html>
