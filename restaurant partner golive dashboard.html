<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>ZipZapZoi Eats - Go Live</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#00f0ff",
                        "background-dark": "#0a0314",
                        "surface-dark": "#1a0b36",
                        "border-dark": "#2a1650",
                        "text-muted": "#9b8ec4"
                    },
                    fontFamily: { "display": ["Plus Jakarta Sans", "sans-serif"] }
                }
            }
        }
    </script>
    <style>
        body { font-family: "Plus Jakarta Sans", sans-serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }

        /* Blinking glow animation for Go Live button */
        @keyframes pulseGlow {
            0%, 100% { box-shadow: 0 0 20px rgba(0,240,255,0.3), 0 0 60px rgba(0,240,255,0.1); transform: scale(1); }
            50% { box-shadow: 0 0 40px rgba(0,240,255,0.6), 0 0 100px rgba(0,240,255,0.3); transform: scale(1.03); }
        }
        .blink-glow { animation: pulseGlow 2s ease-in-out infinite; }

        /* Confetti animation */
        @keyframes confettiFall {
            0% { transform: translateY(-100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }
        .confetti-piece {
            position: fixed; top: 0; width: 10px; height: 10px; z-index: 100;
            animation: confettiFall 3s ease-in-out forwards;
        }

        /* Fade transitions */
        .fade-in { animation: fadeIn 0.6s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0a0314; }
        ::-webkit-scrollbar-thumb { background: #2a1650; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #00f0ff; }
    </style>
</head>
<body class="bg-background-dark text-white min-h-screen flex flex-col">

    <!-- Minimal Header -->
    <header class="flex items-center justify-between px-6 py-4 border-b border-border-dark bg-background-dark/95 backdrop-blur-sm">
        <a href="index.html" class="flex items-center gap-3 text-white hover:text-primary transition-colors">
            <div class="size-8 text-primary">
                <svg class="w-full h-full" fill="none" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
                    <path d="M24 4C25.7818 14.2173 33.7827 22.2182 44 24C33.7827 25.7818 25.7818 33.7827 24 44C22.2182 33.7827 14.2173 25.7818 4 24C14.2173 22.2182 22.2182 14.2173 24 4Z" fill="currentColor"></path>
                </svg>
            </div>
            <h2 class="text-xl font-bold">ZipZapZoi <span class="text-primary font-normal">Partner</span></h2>
        </a>
        <div class="flex items-center gap-4">
            <a href="customer support help.html" class="text-text-muted hover:text-primary text-sm font-medium transition-colors">Need Help?</a>
            <a href="login & registration.html" class="text-text-muted hover:text-white text-sm font-medium transition-colors" id="loginLink">Login</a>
        </div>
    </header>

    <!-- Main Content Area — Single centered content that changes based on state -->
    <main class="flex-1 flex items-center justify-center p-6">
        <div class="w-full max-w-lg text-center" id="contentArea">
            <!-- Content is injected by JavaScript based on state -->
        </div>
    </main>

    <!-- Minimal Footer -->
    <footer class="px-6 py-4 border-t border-border-dark flex items-center justify-between text-xs text-text-muted">
        <span>© 2025 ZipZapZoi Technologies</span>
        <div class="flex gap-4">
            <a href="privacy policy.html" class="hover:text-primary transition-colors">Privacy</a>
            <a href="terms&conditions.html" class="hover:text-primary transition-colors">Terms</a>
            <a href="customer support help.html" class="hover:text-primary transition-colors">Support</a>
        </div>
    </footer>

    <script>
        // ═══════════════════════════════════════════
        // STATE MACHINE — 3 states:
        // 1. 'ready'    → Show blinking "Go Live Now" button
        // 2. 'pending'  → Show "Under Verification" message
        // 3. 'approved' → Show Congratulations + link to dashboard
        // ═══════════════════════════════════════════

        const contentArea = document.getElementById('contentArea');

        // Get restaurant name from partner application
        let restaurantName = 'Your Restaurant';
        let partnerEmail = '';
        try {
            const apps = JSON.parse(localStorage.getItem('zoiPartnerApplications') || '[]');
            if (apps.length) {
                const latest = apps[apps.length - 1];
                restaurantName = latest.name || restaurantName;
                partnerEmail = latest.email || '';
            }
        } catch(e) {}

        // Get current state
        function getGoLiveState() {
            return localStorage.getItem('zoiGoLiveStatus') || 'ready';
        }

        // ─── STATE 1: READY (Blinking Go Live button) ───
        function renderReady() {
            contentArea.innerHTML = `
                <div class="fade-in flex flex-col items-center gap-8">
                    <!-- Icon -->
                    <div class="relative">
                        <div class="w-24 h-24 rounded-full bg-primary/10 border-2 border-primary/30 flex items-center justify-center">
                            <span class="material-symbols-outlined text-primary" style="font-size:48px">rocket_launch</span>
                        </div>
                        <div class="absolute -top-1 -right-1 w-6 h-6 rounded-full bg-green-500 flex items-center justify-center animate-pulse">
                            <span class="material-symbols-outlined text-white" style="font-size:14px">check</span>
                        </div>
                    </div>

                    <!-- Text -->
                    <div>
                        <h1 class="text-3xl md:text-4xl font-black text-white mb-3">Ready to Go Live!</h1>
                        <p class="text-text-muted text-lg max-w-md mx-auto">
                            <span class="text-white font-semibold">${restaurantName}</span> is all set up. 
                            Click the button below to submit for verification and go live on ZipZapZoi Eats.
                        </p>
                    </div>

                    <!-- Checklist summary -->
                    <div class="flex flex-col gap-2 text-left w-full max-w-sm">
                        <div class="flex items-center gap-3 text-sm text-green-400">
                            <span class="material-symbols-outlined text-base" style="font-variation-settings:'FILL' 1">check_circle</span>
                            Registration Complete
                        </div>
                        <div class="flex items-center gap-3 text-sm text-green-400">
                            <span class="material-symbols-outlined text-base" style="font-variation-settings:'FILL' 1">check_circle</span>
                            Agreement Signed
                        </div>
                        <div class="flex items-center gap-3 text-sm text-green-400">
                            <span class="material-symbols-outlined text-base" style="font-variation-settings:'FILL' 1">check_circle</span>
                            Payout Details Configured
                        </div>
                    </div>

                    <!-- THE BUTTON — Large, centered, blinking -->
                    <button onclick="goLive()" id="goLiveBtn"
                        class="blink-glow w-full max-w-sm py-5 bg-gradient-to-r from-primary to-[#00d4c5] hover:from-[#00d4c5] hover:to-primary text-[#0a0314] font-black text-2xl rounded-2xl transition-all flex items-center justify-center gap-3 cursor-pointer">
                        <span class="material-symbols-outlined" style="font-size:32px">power_settings_new</span>
                        GO LIVE NOW
                    </button>

                    <p class="text-text-muted text-xs">Your application will be reviewed within 24 hours</p>
                </div>
            `;
        }

        // ─── STATE 2: PENDING VERIFICATION ───
        function renderPending() {
            const submittedAt = localStorage.getItem('zoiGoLiveSubmittedAt');
            let timeAgo = '';
            if (submittedAt) {
                const diff = Date.now() - new Date(submittedAt).getTime();
                const hours = Math.floor(diff / 3600000);
                const mins = Math.floor((diff % 3600000) / 60000);
                timeAgo = hours > 0 ? `${hours}h ${mins}m ago` : `${mins}m ago`;
            }

            contentArea.innerHTML = `
                <div class="fade-in flex flex-col items-center gap-8">
                    <!-- Animated verification icon -->
                    <div class="relative">
                        <div class="w-28 h-28 rounded-full bg-amber-500/10 border-2 border-amber-500/30 flex items-center justify-center">
                            <span class="material-symbols-outlined text-amber-400 animate-pulse" style="font-size:56px">hourglass_top</span>
                        </div>
                    </div>

                    <!-- Message -->
                    <div>
                        <h1 class="text-3xl md:text-4xl font-black text-white mb-3">Under Verification</h1>
                        <p class="text-text-muted text-lg max-w-md mx-auto mb-2">
                            Your application for <span class="text-white font-semibold">${restaurantName}</span> 
                            has been submitted and is currently under review.
                        </p>
                        <div class="bg-amber-500/10 border border-amber-500/20 rounded-xl p-4 mx-auto max-w-sm mt-4">
                            <p class="text-amber-300 text-sm font-bold flex items-center justify-center gap-2">
                                <span class="material-symbols-outlined text-base">schedule</span>
                                Please wait up to 24 hours for verification
                            </p>
                        </div>
                    </div>

                    <!-- Status details -->
                    <div class="bg-surface-dark border border-border-dark rounded-xl p-5 w-full max-w-sm text-left">
                        <h3 class="text-white font-bold text-sm mb-3">Application Status</h3>
                        <div class="space-y-3">
                            <div class="flex items-center justify-between text-sm">
                                <span class="text-text-muted">Restaurant</span>
                                <span class="text-white font-medium">${restaurantName}</span>
                            </div>
                            <div class="flex items-center justify-between text-sm">
                                <span class="text-text-muted">Status</span>
                                <span class="text-amber-400 font-bold flex items-center gap-1">
                                    <span class="w-2 h-2 rounded-full bg-amber-400 animate-pulse"></span>
                                    Pending Review
                                </span>
                            </div>
                            ${timeAgo ? `<div class="flex items-center justify-between text-sm">
                                <span class="text-text-muted">Submitted</span>
                                <span class="text-white">${timeAgo}</span>
                            </div>` : ''}
                            <div class="flex items-center justify-between text-sm">
                                <span class="text-text-muted">Est. Completion</span>
                                <span class="text-white">Within 24 hours</span>
                            </div>
                        </div>
                    </div>

                    <!-- What happens next -->
                    <div class="text-left w-full max-w-sm">
                        <h3 class="text-white font-bold text-sm mb-2">What happens next?</h3>
                        <ul class="text-text-muted text-sm space-y-2">
                            <li class="flex items-start gap-2">
                                <span class="text-primary mt-0.5">1.</span>
                                Our team verifies your documents and details
                            </li>
                            <li class="flex items-start gap-2">
                                <span class="text-primary mt-0.5">2.</span>
                                You'll receive a congratulations notification
                            </li>
                            <li class="flex items-start gap-2">
                                <span class="text-primary mt-0.5">3.</span>
                                Access your Partner Dashboard and start receiving orders!
                            </li>
                        </ul>
                    </div>

                    <p class="text-text-muted text-xs">
                        Questions? <a href="customer support help.html" class="text-primary hover:underline">Contact Support</a>
                    </p>
                </div>
            `;
        }

        // ─── STATE 3: APPROVED — CONGRATULATIONS ───
        function renderApproved() {
            // Fire confetti
            launchConfetti();

            contentArea.innerHTML = `
                <div class="fade-in flex flex-col items-center gap-8">
                    <!-- Success icon -->
                    <div class="relative">
                        <div class="w-28 h-28 rounded-full bg-green-500/10 border-2 border-green-500/30 flex items-center justify-center">
                            <span class="material-symbols-outlined text-green-400" style="font-size:56px;font-variation-settings:'FILL' 1">celebration</span>
                        </div>
                    </div>

                    <!-- Congratulations message -->
                    <div>
                        <h1 class="text-3xl md:text-4xl font-black text-white mb-3">🎉 Congratulations!</h1>
                        <p class="text-text-muted text-lg max-w-md mx-auto">
                            <span class="text-white font-semibold">${restaurantName}</span> has been verified 
                            and is now live on ZipZapZoi Eats!
                        </p>
                    </div>

                    <!-- Success card -->
                    <div class="bg-green-500/10 border border-green-500/20 rounded-xl p-6 w-full max-w-sm">
                        <div class="flex items-center justify-center gap-2 text-green-400 font-bold mb-3">
                            <span class="material-symbols-outlined" style="font-variation-settings:'FILL' 1">verified</span>
                            Onboarding Complete
                        </div>
                        <p class="text-green-300/80 text-sm text-center">
                            You can now access your Partner Dashboard to manage orders, update your menu, and track earnings.
                        </p>
                    </div>

                    <!-- CTA — Go to Dashboard -->
                    <a href="restaurant_partner_dashboard.html" 
                        class="blink-glow w-full max-w-sm py-5 bg-gradient-to-r from-primary to-[#00d4c5] text-[#0a0314] font-black text-xl rounded-2xl transition-all flex items-center justify-center gap-3 no-underline">
                        <span class="material-symbols-outlined" style="font-size:28px">dashboard</span>
                        Open Partner Dashboard
                    </a>

                    <!-- Or login separately -->
                    <div class="text-center">
                        <p class="text-text-muted text-sm mb-1">Or login with your credentials:</p>
                        <a href="login & registration.html" class="text-primary hover:underline text-sm font-bold">
                            Login to ZipZapZoi Eats →
                        </a>
                        ${partnerEmail ? `<p class="text-text-muted text-xs mt-2">Registered email: <span class="text-white">${partnerEmail}</span></p>` : ''}
                    </div>
                </div>
            `;
        }

        // ─── GO LIVE ACTION ───
        function goLive() {
            const btn = document.getElementById('goLiveBtn');
            btn.classList.remove('blink-glow');
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin" style="font-size:28px">sync</span> Submitting...';
            btn.disabled = true;

            setTimeout(() => {
                // Save state
                localStorage.setItem('zoiGoLiveStatus', 'pending');
                localStorage.setItem('zoiGoLiveSubmittedAt', new Date().toISOString());
                localStorage.setItem('zoiKitchenStatus', 'pending_verification');

                // Update partner application status
                try {
                    const apps = JSON.parse(localStorage.getItem('zoiPartnerApplications') || '[]');
                    if (apps.length) {
                        apps[apps.length - 1].status = 'pending_verification';
                        localStorage.setItem('zoiPartnerApplications', JSON.stringify(apps));
                    }
                } catch(e) {}

                // Re-render
                renderPending();
            }, 2000);
        }

        // ─── CONFETTI ───
        function launchConfetti() {
            const colors = ['#00f0ff', '#8b5cf6', '#f59e0b', '#ef4444', '#22c55e', '#ec4899'];
            for (let i = 0; i < 50; i++) {
                const piece = document.createElement('div');
                piece.className = 'confetti-piece';
                piece.style.left = Math.random() * 100 + 'vw';
                piece.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                piece.style.animationDelay = Math.random() * 2 + 's';
                piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
                document.body.appendChild(piece);
                setTimeout(() => piece.remove(), 5000);
            }
        }

        // ─── INIT ───
        function render() {
            const state = getGoLiveState();
            if (state === 'approved') renderApproved();
            else if (state === 'pending') renderPending();
            else renderReady();

            // Show partner name in login link if logged in
            try {
                const user = JSON.parse(localStorage.getItem('zoiUser') || 'null');
                if (user && user.name) {
                    document.getElementById('loginLink').textContent = user.name;
                }
            } catch(e) {}
        }

        render();

        // Auto-check for admin approval every 10 seconds (simulates polling)
        setInterval(() => {
            if (getGoLiveState() === 'pending') {
                // Check if admin has approved (admin console would set this)
                const apps = JSON.parse(localStorage.getItem('zoiPartnerApplications') || '[]');
                if (apps.length && apps[apps.length - 1].status === 'approved') {
                    localStorage.setItem('zoiGoLiveStatus', 'approved');
                    localStorage.setItem('zoiKitchenStatus', 'online');
                    render();
                }
            }
        }, 10000);
    </script>

    <script src="js/zoi_ai_assistant.js?v=5"></script>
    <script src="js/zoi_config.js"></script>
    <script src="js/zoi_partner_engine.js"></script>
    <script src="js/zoi_theme.js?v=5"></script>
</body>
</html>
